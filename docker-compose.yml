services:
  postgres:
    image: postgres:16-alpine
    container_name: tcg-collector-postgres
    environment:
      POSTGRES_USER: tcgcollector
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: tcgcollector
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tcgcollector']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
